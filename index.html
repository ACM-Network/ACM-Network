<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site Closed</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            background: linear-gradient(45deg, #1a1a1a, #000);
            animation: gradient 10s ease infinite;
        }
        @keyframes gradient {
            0%, 100% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
        }

        .message-box {
            text-align: center;
            padding: 50px;
            border: 3px solid #f5f5f5;
            border-radius: 15px;
            background-color: rgba(255, 255, 255, 0.1);
            box-shadow: 0px 0px 30px 10px rgba(255, 255, 255, 0.2);
            animation: fadeIn 1s ease-out, scaleIn 1.5s ease-out;
            position: relative;
            overflow: hidden;
        }

        .message-box h1 {
            font-size: 48px;
            margin-bottom: 20px;
            animation: glow 2s ease-in-out infinite alternate;
        }

        .message-box p {
            font-size: 24px;
            margin: 0;
            animation: textSlide 2s ease-in-out infinite alternate;
        }

        .message-box .animated-element {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 100%;
            background: url('https://www.transparenttextures.com/patterns/diagmonds.png');
            opacity: 0.05;
            animation: slideUpDown 10s ease-in-out infinite;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes scaleIn {
            from { transform: scale(0.5); }
            to { transform: scale(1); }
        }

        @keyframes glow {
            from { text-shadow: 0 0 10px #00d2ff, 0 0 20px #00d2ff, 0 0 30px #00d2ff, 0 0 40px #00d2ff; }
            to { text-shadow: 0 0 20px #00d2ff, 0 0 30px #00d2ff, 0 0 40px #00d2ff, 0 0 50px #00d2ff; }
        }

        @keyframes textSlide {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        @keyframes twinkling {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }

        @keyframes slideUpDown {
            0% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0); }
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #fff;
            border-radius: 50%;
            animation: twinkling 5s infinite ease-in-out;
        }

        /* Star Field */
        .star:nth-child(1) { top: 10%; left: 20%; animation-duration: 3s; }
        .star:nth-child(2) { top: 30%; left: 60%; animation-duration: 4s; }
        .star:nth-child(3) { top: 50%; left: 80%; animation-duration: 2s; }
        .star:nth-child(4) { top: 70%; left: 40%; animation-duration: 6s; }
        .star:nth-child(5) { top: 85%; left: 70%; animation-duration: 3.5s; }

        .particle {
            position: absolute;
            width: 10px;
            height: 10px;
            background-color: #fff;
            opacity: 0.8;
            border-radius: 50%;
            animation: move 10s infinite ease-in-out;
        }

        @keyframes move {
            0% {
                transform: translate(0, 0) scale(0.5);
                opacity: 0.5;
            }
            50% {
                transform: translate(200px, -200px) scale(1);
                opacity: 1;
            }
            100% {
                transform: translate(0, 0) scale(0.5);
                opacity: 0.5;
            }
        }

        .countdown {
            margin-top: 20px;
            font-size: 20px;
        }

        .social-icons {
            margin-top: 20px;
        }

        .social-icons a {
            margin: 0 10px;
            text-decoration: none;
            color: #00d2ff;
            font-size: 30px;
        }

        .music-controls {
            margin-top: 20px;
        }

        .music-controls audio {
            width: 300px;
        }
    </style>
</head>
<body>
    <div class="message-box">
        <h1>We're Closed</h1>
        <p>We'll be back soon. Stay tuned!</p>
        <div class="animated-element"></div>
        <div class="countdown" id="countdown"></div>
        <div class="social-icons">
            <a href="#" title="Facebook">&#xf09a;</a>
            <a href="#" title="Twitter">&#xf099;</a>
            <a href="#" title="Instagram">&#xf16d;</a>
        </div>
        <div class="music-controls">
            <audio controls autoplay loop>
                <source src="background-music.mp3" type="audio/mp3">
                Your browser does not support the audio element.
            </audio>
        </div>
    </div>

    <!-- Adding Starry Background -->
    <div class="star" style="top: 20%; left: 30%;"></div>
    <div class="star" style="top: 40%; left: 70%;"></div>
    <div class="star" style="top: 60%; left: 50%;"></div>
    <div class="star" style="top: 80%; left: 90%;"></div>
    <div class="star" style="top: 10%; left: 80%;"></div>
    <div class="star" style="top: 30%; left: 20%;"></div>
    <div class="star" style="top: 50%; left: 40%;"></div>
    <div class="star" style="top: 70%; left: 60%;"></div>
    <div class="star" style="top: 90%; left: 10%;"></div>
    <div class="star" style="top: 85%; left: 50%;"></div>

    <!-- Adding Particle Effects -->
    <div class="particle" style="top: 30%; left: 10%;"></div>
    <div class="particle" style="top: 60%; left: 50%;"></div>
    <div class="particle" style="top: 80%; left: 20%;"></div>
    <div class="particle" style="top: 50%; left: 70%;"></div>
    <div class="particle" style="top: 90%; left: 40%;"></div>

    <script>
        // Countdown Timer
        function countdown() {

            const now = new Date().getTime();
            const distance = eventDate - now;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);
