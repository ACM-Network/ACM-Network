        <script>
            function toggleDarkMode() {
                var body = document.body;
                body.classList.toggle("dark-mode");

                var icon = document.getElementById("icon");
                if (body.classList.contains("dark-mode")) {
                    icon.classList.remove("bulb");
                    icon.classList.add("moon");
                } else {
                    icon.classList.remove("moon");
                    icon.classList.add("bulb");
                }
            }

            // Ensure the initial icon state matches the current mode
            document.addEventListener('DOMContentLoaded', (event) => {
                var icon = document.getElementById("icon");
                if (document.body.classList.contains("dark-mode")) {
                    icon.classList.add("moon");
                } else {
                    icon.classList.add("bulb");

<script>
    $(document).ready(function() { 
        var dftr = $('select.dftr'), headerCount = $('#headerCount');
        headerCount.html('select a filter or use search'); 
        dftr.on('change', function() { 
            dftr.attr('disabled', 'disabled'); 
            var records = $('#tvvTable').find('.tvv-item'); 
            records.hide(); 
            var critriaAttributes = []; 
            dftr.each(function() { 
                var $this = $(this), $selectedLength = $this.find(':selected').length, $critriaAttribute = ''; 
                if ($selectedLength > 0 && $this.val() != '0') { 
                    if ($selectedLength == 1) { 
                        $critriaAttribute += '[data-' + $this.data('attribute') + '*="' + $this.val() + '"]'; 
                    } else { 
                        var $startDataAttribute = '[data-' + $this.data('attribute') + '*="', $endDataAttribute = '"]', $selectedValues = $this.val().toString(); 
                        $critriaAttribute += $startDataAttribute + $selectedValues.replaceAll(',', ($endDataAttribute + ',' + $startDataAttribute)) + $endDataAttribute; 
                    } 
                    critriaAttributes.push($critriaAttribute); 
                } 
            }); 
            var $showRecords = records; 
            if (critriaAttributes.length > 0) { 
                $.each(critriaAttributes, function(i, filterValue) { 
                    $showRecords = $showRecords.filter(filterValue); 
                }); 
            } 
            $showRecords.show(); 
            headerCount.html($showRecords.length + ' channels filtered'); 
            dftr.removeAttr('disabled'); 
            $(".fin").val(''); 
        }); 
        $(".fin").keyup(function() { 
            var filter = $(this).val(), count = 0; 
            $('select.dftr').prop('selectedIndex',0); 
            $(".tvv-item").each(function() { 
                if ($(this).text().search(new RegExp(filter, "i")) < 0) { 
                    $(this).fadeOut(); 
                } else { 
                    $(this).show(); 
                    count++; 
                } 
            }); 
        }); 
    }); 
</script>
<script>
    async function fetchData() {
        const response = await fetch('/TP/Category.json');
        const jsonData = await response.json();
        return jsonData;
    }

    async function changeChannelGroup() {
        var selectedValue = $("#channel-dropdown").val();
        $(".tvv-item").hide();
        const jsonData = await fetchData();
        for (var i = 0; i < jsonData.length; i++) {
            var item = jsonData[i];
            if (selectedValue === "All" || item.channel_genre === selectedValue) {
                $(".tvv-item:has(.tvv-name:contains('" + item.channel_name + "'))").show();
            }
        }
    }

    fetchData();
</script>
<script>
    async function fetchAndDisplayChannels() {
        try {
            const response = await fetch('/TP/Category.json');
            if (!response.ok) {
                throw new Error('Network response was not ok ' + response.statusText);
            }
            const channels = await response.json();
            const container = document.getElementById('channel-container');
            channels.forEach(channel => {
                const tvvItem = document.createElement('div');
                tvvItem.className = 'tvv-item';
                const anchor = document.createElement('a');
                anchor.href = `/TP/Player.html?id=${channel.channel_id}`;
                anchor.className = 'tvv-thumb';
                const img = document.createElement('img');
                img.className = 'lazyload';
                img.setAttribute('data-src', channel.channel_logo);
                img.style.height = '90px';
                const card = document.createElement('div');
                card.className = 'card-';
                const nameDiv = document.createElement('div');
                nameDiv.className = 'tvv-name';
                nameDiv.textContent = channel.channel_name;
                card.appendChild(nameDiv);
                anchor.appendChild(img);
                anchor.appendChild(card);
                tvvItem.appendChild(anchor);
                container.appendChild(tvvItem);
            });
        } catch (error) {
            console.error('Error fetching the JSON data:', error);
        }
    }

    fetchAndDisplayChannels();
</script>

<script>
    window.onload = function() {
        var puURL = '#';
        var puTS = Math.round(+new Date()/1000);
        console.log('T.'+localStorage.puTS+'/'+puTS);
        if (typeof localStorage.puTS == 'undefined' || parseInt(localStorage.puTS) <= (puTS - 3600)) {
            var links = document.getElementsByTagName('a');
            for(var i = 0, len = links.length; i < len; i++) {
                links[i].onclick = function (e) {
                    var puHref = this.getAttribute("href");
                    var puTarget = this.getAttribute("target");
                    if (puHref !== '#' && puHref !== 'javascript:void(0)') {
                        e.preventDefault();    
                        if (puTarget == '_blank') {
                            window.open(window.location.href);
                        }
                        window.open(puHref);
                        window.location.href = puURL;
                        localStorage.puTS = puTS;
                    }
                }
            }
        }
    };
</script>

<!-- Video Player Section -->
<div class="video-container">
    <video id="player" controls></video>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const player = new Plyr('#player', {
            captions: { active: true, language: 'auto' },
            seekTime: 10,
            controls: [
                'play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'settings', 'pip', 'airplay', 'fullscreen'
            ],
            disableContextMenu: false,
            hideControls: false,
        });

        const videoSrc = 'https://path.to/your/video/stream.m3u8';  // Update with actual video stream URL
        if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(videoSrc);
            hls.attachMedia(player.media);
            hls.on(Hls.Events.MANIFEST_PARSED, function () {
                player.play();
            });
        } else if (player.canPlayType('application/vnd.apple.mpegurl')) {
            player.src = videoSrc;
            player.play();
        }
    });
</script>
