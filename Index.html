<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Closed</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #2b5876 0%, #4e4376 100%);
            color: #ffffff;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            animation: fadeIn 2s ease-in-out;
        }

        h1 {
            font-size: 3rem;
            margin: 0;
            animation: slideIn 2s ease-in-out;
        }

        p {
            font-size: 1.5rem;
            margin-top: 1rem;
            animation: slideIn 2s ease-in-out 1s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideIn {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: transparent;
            animation: stars 100s linear infinite;
        }

        .star {
            width: 2px;
            height: 2px;
            background: white;
            position: absolute;
            bottom: 0;
            animation: fall 10s linear infinite;
        }

        @keyframes stars {
            from { transform: translateY(0); }
            to { transform: translateY(-2000px); }
        }

        @keyframes fall {
            from { transform: translateY(0); opacity: 1; }
            to { transform: translateY(-1000px); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Website Closed</h1>
        <p>We'll be back soon!</p>
    </div>
    <div class="stars">
        <div class="star" style="left: 10%; animation-duration: 15s;"></div>
        <div class="star" style="left: 20%; animation-duration: 20s;"></div>
        <div class="star" style="left: 30%; animation-duration: 12s;"></div>
        <div class="star" style="left: 40%; animation-duration: 25s;"></div>
        <div class="star" style="left: 50%; animation-duration: 10s;"></div>
        <div class="star" style="left: 60%; animation-duration: 18s;"></div>
        <div class="star" style="left: 70%; animation-duration: 30s;"></div>
        <div class="star" style="left: 80%; animation-duration: 16s;"></div>
        <div class="star" style="left: 90%; animation-duration: 22s;"></div>
    </div>
</body>
</html>
